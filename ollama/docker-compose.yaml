services:
  comfyui:
    profiles: ["image"]
    image: ghcr.io/ai-dock/comfyui:latest-cuda
    container_name: comfyui
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      COMFYUI_ARGS: --listen --port 8188 --preview-method auto
      WEB_PORT: 8188
      WEB_ENABLE_AUTH: "false"
      SERVERLESS: "true"
    volumes:
      - ./comfy-data/user:/opt/ComfyUI/user
      - ./comfy-data/output:/opt/ComfyUI/output
      - ./forge-data/models/Stable-diffusion:/opt/ComfyUI/models/checkpoints
      - ./forge-data/models/VAE:/opt/ComfyUI/models/vae
      - ./forge-data/models/LoRA:/opt/ComfyUI/models/loras
    ports:
      - "8188:8188"
  forge:
    profiles: ["image"]
    image: ghcr.io/ai-dock/stable-diffusion-webui-forge:latest-cuda
    container_name: forge-headless
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      # --api: Permite o OpenWebUI mandar comandos
      # --no-half-vae: Evita imagens pretas/erro NaN na série 16xx
      # --xformers: Otimização agressiva de memória
      FORGE_ARGS: "--listen --api --no-half-vae --xformers"
      FORGE_PORT_HOST: "7860"
      FORGE_URL: "0.0.0.0:7860"
      WEB_ENABLE_AUTH: "false"
      SERVERLESS: "true"
    volumes:
      - ./forge-data/models:/opt/stable-diffusion-webui-forge/models
      - ./forge-data/outputs:/opt/stable-diffusion-webui-forge/outputs
    ports:
      - "17860:17860"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7860/sdapi/v1/progress"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 60s
  ollama:
    profiles: ["ollama"]
    image: ollama/ollama:0.17.6
    runtime: nvidia
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    container_name: ollama
    restart: unless-stopped
    environment:
      OLLAMA_NUM_PARALLEL: "3"
    ports:
      - "11434:11434"
    volumes:
      - ollama:/root/.ollama
  open-webui:
    image: ghcr.io/open-webui/open-webui:0.6.18
    container_name: open-webui
    restart: unless-stopped
    environment:
      OLLAMA_BASE_URL: http://ollama:11434
      ENABLE_OPENAI_API: true
      OPENAI_API_BASE_URL: http://llama-cpp:8080/v1
      OPENAI_API_KEY: "sk-unused"
      WEBUI_AUTH: false
      ENABLE_TITLE_GENERATION: true
      ENABLE_DIRECT_CONNECTIONS: true
      CHROMA_HTTP_HOST: chromadb
      CHROMA_HTTP_PORT: 8000
      # https://github.com/openai/whisper
      WHISPER_MODEL: small
      # https://docs.openwebui.com/getting-started/env-configuration/#web-loader-configuration
      # TODO: enhance this later
      ENABLE_WEB_SEARCH: true
      WEB_SEARCH_RESULT_COUNT: 5
      ENABLE_IMAGE_GENERATION: true
      IMAGE_GENERATION_ENGINE: automatic1111
      AUTOMATIC1111_BASE_URL: http://forge:7860
      IMAGE_SIZE: 512x512
    ports:
      - "11435:8080"
    volumes:
      - open-webui:/app/backend/data
  llama-cpp:
    image: ghcr.io/ggml-org/llama.cpp:server-cuda
    container_name: llama-cpp
    restart: unless-stopped
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    environment:
      # Model to load - change this to switch models
      # 4B Q4_K_M: ngl 99, 42 tok/s | 9B Q3_K_M: ngl 99, 25 tok/s (best)
      # 9B Q4_K_M: ngl 31 + q4_0 KV cache, 17 tok/s (partial offload)
      LLAMA_ARG_MODEL: /models/Qwen3.5-9B-Q3_K_M.gguf
      LLAMA_ARG_N_GPU_LAYERS: "99"
      LLAMA_ARG_CTX_SIZE: "16384"
      LLAMA_ARG_FLASH_ATTN: "on"
      LLAMA_ARG_THREADS: "6"
      LLAMA_ARG_HOST: "0.0.0.0"
      LLAMA_ARG_PORT: "8080"
      # Jinja templates for proper Qwen chat format
      LLAMA_ARG_JINJA: "true"
    volumes:
      - ./llama-models:/models
    ports:
      - "8081:8080"
  picoclaw:
    build:
      context: https://github.com/sipeed/picoclaw.git
      dockerfile: docker/Dockerfile
    container_name: picoclaw
    restart: unless-stopped
    environment:
      PICOCLAW_GATEWAY_HOST: "0.0.0.0"
      PICOCLAW_CHANNELS_TELEGRAM_TOKEN: "${TELEGRAM_BOT_TOKEN}"
    volumes:
      - picoclaw-data:/home/picoclaw/.picoclaw
      - ./picoclaw-config.json:/home/picoclaw/.picoclaw/config.json
    ports:
      - "18790:18790"
  chromadb:
    image: chromadb/chroma:0.6.3
    container_name: chromadb
    environment:
      IS_PERSISTENT: TRUE
      ANONYMIZED_TELEMETRY: FALSE
    ports:
      - "11436:8000"
    volumes:
      - ./chromadb.yaml:/config.yaml
      - chromadb:/data

volumes:
  ollama:
    external: true
  open-webui:
    external: false
  picoclaw-data:
    external: false
  chromadb:
    external: true
